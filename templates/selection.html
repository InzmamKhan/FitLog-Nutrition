<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLog Nutrition — Select Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="center-box">
        <div style="text-align: center; margin-bottom: 0.5rem;">
            <h2 style="text-transform: uppercase; letter-spacing: 0.05em; font-size: 1.25rem;">Select Profile</h2>
            <p>Choose an active tracking session</p>
        </div>

        <form action="{{ url_for('server.selection') }}" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; flex-direction: column; gap: 0.75rem; max-height: 280px; overflow-y: auto; padding-right: 2px;">
                {% for profile in profiles %}
                <label class="profile-select-item">
                    <div>
                        <span style="font-weight: 500; font-size: 0.95rem; display: block;">{{ profile.Name }}</span>
                        <span style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.02em;">Goal: {{ profile.Objective }}</span>
                    </div>
                    <input type="radio" name="user_id" value="{{ profile.User_ID }}" {% if loop.first %}checked{% endif %} style="accent-color: var(--text-main); cursor: pointer;">
                </label>
                {% endfor %}
            </div>

            <button type="submit" class="btn-submit" style="margin-top: 0.5rem;">Launch Session</button>
        </form>

        <div style="text-align: center; border-top: 1px solid var(--border-subtle); padding-top: 1rem; margin-top: 0.25rem;">
            <a href="{{ url_for('server.wizard') }}" style="font-size: 0.8rem; letter-spacing: 0.02em; text-transform: uppercase; color: var(--text-muted);">+ Register New Profile</a>
        </div>
    </div>

</body>
</html>
